name: Release Assets

# A tag triggers the FULL build pipeline (3-platform test+race, lint,
# govulncheck, package) as a hard gate; only if every job passes does the
# publish job run. Publish downloads the exact artifacts the pipeline built
# and verified — it never rebuilds — then attests provenance, generates an
# SBOM, and uploads to a DRAFT release; the assets are pulled back and
# re-verified (checksums + expected asset set) before the release is published,
# so a partial or tampered upload never appears as a live release.
on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate SemVer release tag
        id: validate
        run: |
          scripts/validate-release-tag.sh "$GITHUB_REF_NAME" | tee "$RUNNER_TEMP/release-tag.env"
          cat "$RUNNER_TEMP/release-tag.env" >> "$GITHUB_OUTPUT"

  # Hard release gate: the same jobs ci.yml runs, on all three platforms.
  build:
    needs: tag
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }}

  publish:
    name: Publish release
    needs: [tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release and upload assets
      id-token: write       # provenance attestation (sigstore OIDC)
      attestations: write   # provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Fail fast: a tag without its changelog section must die before publish
      # (the release body is sliced from CHANGELOG.md).
      - name: Extract release notes from CHANGELOG.md
        run: |
          scripts/extract-changelog.sh "$GITHUB_REF_NAME" > "$RUNNER_TEMP/release-notes.md"
          echo "--- release notes for $GITHUB_REF_NAME ---"
          cat "$RUNNER_TEMP/release-notes.md"

      # Promote the exact artifacts the build pipeline produced. No recompile.
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      # Re-verify integrity of the promoted artifacts after upload/download.
      - name: Re-verify checksums and binary count
        run: |
          cd dist
          sha256sum --check checksums.txt
          count="$(find . -maxdepth 1 -name "oma_${GITHUB_REF_NAME}_*" -type f | wc -l)"
          if [ "$count" -ne 6 ]; then
            echo "expected 6 platform binaries, found $count" >&2
            exit 1
          fi

      # SBOM of the actual shipped artifacts (syft reads each Go binary's embedded
      # module info), so the bill of materials reflects what users download rather
      # than just the source tree. It is attested below, not left unverifiable.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Build provenance: a signed attestation binding each binary's digest to
      # this workflow run. `gh attestation verify` (and the installer, as a
      # follow-up) can then prove an asset came from this pipeline.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/oma_*
            dist/assets-*.tar.gz
            dist/sbom.spdx.json

      # Draft first: assets upload to a NON-public release, get verified, and
      # only then is it published — a partial upload never appears as a live
      # release (GitHub's recommended prep flow for immutable releases).
      - name: Create or reuse a draft release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.tag.outputs.is_prerelease }}
        run: |
          tag="${GITHUB_REF_NAME}"
          latest_args=()
          if [ "$IS_PRERELEASE" = "true" ]; then
            latest_args+=(--latest=false)
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            # An ALREADY-PUBLISHED release must never be reverted to draft (that
            # would hide a valid public release when the no-clobber upload below
            # fails on its existing assets). Only an existing *draft* is reused.
            if [ "$(gh release view "$tag" --json isDraft -q .isDraft)" != "true" ]; then
              echo "release $tag is already published; refusing to revert it to draft — cut a new version instead" >&2
              exit 1
            fi
            gh release edit "$tag" --title "$tag" --notes-file "$RUNNER_TEMP/release-notes.md" --verify-tag --draft --prerelease="$IS_PRERELEASE"
          else
            gh release create "$tag" --title "$tag" --notes-file "$RUNNER_TEMP/release-notes.md" --verify-tag --draft --prerelease="$IS_PRERELEASE" "${latest_args[@]}"
          fi
          actual_draft="$(gh release view "$tag" --json isDraft -q .isDraft)"
          actual_prerelease="$(gh release view "$tag" --json isPrerelease -q .isPrerelease)"
          if [ "$actual_draft" != "true" ] || [ "$actual_prerelease" != "$IS_PRERELEASE" ]; then
            echo "release classification mismatch before upload: draft=$actual_draft prerelease=$actual_prerelease want draft=true prerelease=$IS_PRERELEASE" >&2
            exit 1
          fi

      # No --clobber: a re-run never silently overwrites an already-uploaded asset.
      - name: Upload assets to the draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*

      # Pull the uploaded assets back down and re-verify integrity + the expected
      # asset set before anything becomes public.
      - name: Verify the draft's assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          dir="$RUNNER_TEMP/verify"
          gh release download "$tag" --dir "$dir"
          cd "$dir"
          sha256sum --check checksums.txt
          test -f "sbom.spdx.json" || { echo "missing sbom.spdx.json" >&2; exit 1; }
          test -f "assets-${tag}.tar.gz" || { echo "missing assets-${tag}.tar.gz" >&2; exit 1; }
          count="$(find . -maxdepth 1 -name "oma_${tag}_*" -type f | wc -l)"
          if [ "$count" -ne 6 ]; then
            echo "expected 6 platform binaries on the release, found $count" >&2
            exit 1
          fi
          echo "draft assets verified: 6 binaries + checksums + sbom + assets bundle"

      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ needs.tag.outputs.is_prerelease }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release edit "$tag" --draft=false --verify-tag --prerelease="$IS_PRERELEASE"
          actual_draft="$(gh release view "$tag" --json isDraft -q .isDraft)"
          actual_prerelease="$(gh release view "$tag" --json isPrerelease -q .isPrerelease)"
          if [ "$actual_draft" != "false" ] || [ "$actual_prerelease" != "$IS_PRERELEASE" ]; then
            echo "published release classification mismatch: draft=$actual_draft prerelease=$actual_prerelease want draft=false prerelease=$IS_PRERELEASE" >&2
            exit 1
          fi
