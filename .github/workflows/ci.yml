name: CI

# CI is the reusable build pipeline run on every push to main and every PR.
# Tags are handled by release.yml, which calls the SAME pipeline before it
# publishes, so a release can never ship code CI has not fully gated.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: dev
