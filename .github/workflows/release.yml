name: Release Assets

# A tag triggers the FULL build pipeline (3-platform test+race, lint,
# govulncheck, package) as a hard gate; only if every job passes does the
# publish job run. Publish downloads the exact artifacts the pipeline built
# and verified — it never rebuilds — then attests provenance, generates an
# SBOM, and uploads without --clobber (existing assets are never overwritten).
on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  # Hard release gate: the same jobs ci.yml runs, on all three platforms.
  build:
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.ref_name }}

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create the release and upload assets
      id-token: write       # provenance attestation (sigstore OIDC)
      attestations: write   # provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Fail fast: a tag without its changelog section must die before publish
      # (the release body is sliced from CHANGELOG.md).
      - name: Extract release notes from CHANGELOG.md
        run: |
          scripts/extract-changelog.sh "$GITHUB_REF_NAME" > "$RUNNER_TEMP/release-notes.md"
          echo "--- release notes for $GITHUB_REF_NAME ---"
          cat "$RUNNER_TEMP/release-notes.md"

      # Promote the exact artifacts the build pipeline produced. No recompile.
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      # Re-verify integrity of the promoted artifacts after upload/download.
      - name: Re-verify checksums and binary count
        run: |
          cd dist
          sha256sum --check checksums.txt
          count="$(find . -maxdepth 1 -name "oma_${GITHUB_REF_NAME}_*" -type f | wc -l)"
          if [ "$count" -ne 6 ]; then
            echo "expected 6 platform binaries, found $count" >&2
            exit 1
          fi

      # Software Bill of Materials for the release.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      # Build provenance: a signed attestation binding each binary's digest to
      # this workflow run. `gh attestation verify` (and the installer, as a
      # follow-up) can then prove an asset came from this pipeline.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/oma_*

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file "$RUNNER_TEMP/release-notes.md" --verify-tag
          else
            gh release create "$tag" --title "$tag" --notes-file "$RUNNER_TEMP/release-notes.md" --verify-tag
          fi

      # No --clobber: a formal release never silently overwrites an asset that
      # already exists. A re-tag with existing assets fails loudly instead.
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*
